{% extends "./base.html" %}

{% block body %}

<style>
    .card-custom {
        border-radius: 15px;
        box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
    }

    .titulo {
        font-weight: bold;
        letter-spacing: 2px;
    }

    .saldo {
        font-size: 20px;
        font-weight: bold;
        color: green;
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-custom {
        border-radius: 10px;
        font-weight: 500;
    }
</style>

<!-- 🔥 HEADER -->
<div class="text-center mb-4">
    <h2 class="titulo">💳 Recargar Tarjeta</h2>
    <p class="text-muted">Gestión de saldo SITU</p>
</div>

<!-- 🔥 CARD INFO -->
<div class="card card-custom mb-4">

    <div class="card-body">

        <p><b>💳 Código:</b> {{tarjeta.codigo}}</p>

        <p class="saldo">
            💰 Saldo actual: ${{tarjeta.monto}}
        </p>

    </div>

</div>

<!-- 🔥 FORM -->
<div class="card card-custom">

    <div class="card-header bg-success text-white">
        <h5 class="mb-0">➕ Recargar saldo</h5>
    </div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <label class="form-label">Monto a recargar</label>
            <input type="number" step="0.01" name="monto"
                   class="form-control mb-3"
                   placeholder="Ingrese valor a recargar"
                   required>

            <button class="btn btn-success btn-custom w-100">
                💰 Recargar
            </button>
        </form>

    </div>
</div>

<!-- 🔥 MENSAJES -->
<div class="mt-3">

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-info">
                {{ m }}
            </div>
        {% endfor %}
    {% endif %}

</div>

{% endblock %}
