{% extends "./base.html" %}

{% block body %}

<style>
    .card-custom {
        border-radius: 15px;
        box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
    }

    .titulo {
        font-weight: bold;
        letter-spacing: 2px;
    }

    .form-control, .form-select {
        border-radius: 10px;
    }

    .btn-custom {
        border-radius: 10px;
        font-weight: 500;
    }
</style>

<!-- 🔥 HEADER -->
<div class="text-center mb-4">
    <h2 class="titulo">💳 Simulación de Pago SITU</h2>
    <p class="text-muted">Control de saldo y viajes</p>
</div>

<!-- 🔥 CARD FORM -->
<div class="card card-custom">

    <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Realizar pago</h5>
    </div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <!-- TARJETA -->
            <label class="form-label">Tarjeta</label>
            <select name="tarjeta" class="form-select mb-3">
                {% for t in tarjetas %}
                    <option value="{{t.id}}">
                        {{t.codigo}} - {{t.idPasajero.nombre}} {{t.idPasajero.apellido}} - Saldo: ${{t.monto}}
                    </option>
                {% endfor %}
            </select>

            <!-- BUS -->
            <label class="form-label">Bus</label>
            <select name="bus" class="form-select mb-3">
                {% for b in buses %}
                    <option value="{{b.id}}">
                        🚍 {{b.placa}} - Unidad {{b.numero}}
                    </option>
                {% endfor %}
            </select>

            <!-- COSTO -->
            <label class="form-label">Costo del viaje</label>
            <input type="number" step="0.01" name="costo" class="form-control mb-3" placeholder="Ingrese valor del pasaje" required>

            <!-- BOTÓN -->
            <button type="submit" class="btn btn-success btn-custom w-100">
                💳 Simular Pago
            </button>

        </form>

    </div>
</div>

<!-- 🔥 MENSAJES -->
<div class="mt-3">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

</div>

{% endblock %}
